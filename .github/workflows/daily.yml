name: Daily News Agent

# 매일 한국시간 12:00 (UTC 03:00) 자동 실행 + 수동 실행 버튼
on:
  schedule:
    - cron: '0 3 * * *'   # 12:00 KST
  workflow_dispatch:       # GitHub UI 에서 수동 실행 가능

jobs:
  send-news:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch news (RSS 수집)
        env:
          PYTHONIOENCODING: utf-8
        run: python fetch_news.py

      - name: Filter news (Claude Haiku 점수)
        env:
          PYTHONIOENCODING: utf-8
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python filter_news.py

      - name: Send email (Gmail SMTP 발송)
        env:
          PYTHONIOENCODING: utf-8
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python send_email.py
