name: Daily News Agent

# GitHub 단독 자동 발송 (PC 무관).
# GitHub cron 은 슬롯을 스킵할 수 있으므로, 하루 여러 시각에 시도하고
# '오늘 이미 보냄' 마커로 중복 발송을 막는다 → 하루 딱 1통 보장.
on:
  schedule:
    # GitHub cron 은 정시(:00) 슬롯이 가장 혼잡 → 스킵될 확률 ↑.
    # 그래서 12:05 KST 부터 5분 간격으로 13:00 KST 까지 12번 시도.
    # '오늘 이미 보냄' 마커(.last_sent) 가 첫 성공 이후 나머지 슬롯을 건너뜀 → 하루 1통 보장.
    - cron: '5,10,15,20,25,30,35,40,45,50,55 3 * * *'  # 12:05~12:55 KST (5분 간격)
    - cron: '0 4 * * *'                                 # 13:00 KST (마지막 백업 슬롯)
  workflow_dispatch:        # 수동 실행 버튼

# 실행 직렬화 — 한 번에 하나만 돌게 강제.
# cron 슬롯이 지연돼 여러 개가 몰려도, 두 번째는 첫 번째가 끝날 때까지(=마커 푸시까지)
# 대기했다가 시작 → 그 시점에 .last_sent 마커를 보고 스킵 → 중복 발송 원천 차단.
concurrency:
  group: daily-news-send
  cancel-in-progress: false

permissions:
  contents: write           # 발송 마커(.last_sent) 커밋용

jobs:
  send-news:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: 오늘 이미 보냈는지 확인 (KST 기준)
        id: guard
        run: |
          TODAY=$(TZ=Asia/Seoul date +%F)
          LAST=$(cat .last_sent 2>/dev/null || echo "none")
          echo "today=$TODAY" >> "$GITHUB_OUTPUT"
          if [ "$LAST" = "$TODAY" ]; then
            echo "이미 오늘($TODAY) 발송됨 → 이번 슬롯은 건너뜀"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "오늘($TODAY) 첫 실행 → 발송 진행"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Python 3.11
        if: steps.guard.outputs.skip == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        if: steps.guard.outputs.skip == 'false'
        run: pip install -r requirements.txt

      - name: Fetch news
        if: steps.guard.outputs.skip == 'false'
        env:
          PYTHONIOENCODING: utf-8
        run: python fetch_news.py

      - name: Filter news
        if: steps.guard.outputs.skip == 'false'
        env:
          PYTHONIOENCODING: utf-8
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python filter_news.py

      - name: Send email
        if: steps.guard.outputs.skip == 'false'
        env:
          PYTHONIOENCODING: utf-8
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python send_email.py

      - name: 발송 성공 마커 기록 (중복 방지)
        if: steps.guard.outputs.skip == 'false' && success()
        run: |
          echo "${{ steps.guard.outputs.today }}" > .last_sent
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .last_sent
          git commit -m "sent ${{ steps.guard.outputs.today }}" || exit 0
          git pull --rebase --autostash || true
          git push
